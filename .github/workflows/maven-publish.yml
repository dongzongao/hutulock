name: Maven Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Build all modules
      run: mvn -B install --file pom.xml -DskipTests

    - name: Publish hutulock-server fat jar only
      run: mvn -B deploy -s $GITHUB_WORKSPACE/settings.xml -pl hutulock-server -DskipTests
      env:
        GITHUB_TOKEN: ${{ github.token }}
